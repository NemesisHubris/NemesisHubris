name: Profile Views Counter

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-views:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch traffic and generate badge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          token = os.environ['GH_TOKEN']
          req = urllib.request.Request(
            'https://api.github.com/repos/nemesishubris/nemesishubris/traffic/views',
            headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json'}
          )
          try:
            with urllib.request.urlopen(req) as r:
              count = json.loads(r.read()).get('count', 0)
          except Exception as e:
            print(f"Traffic API error: {e}")
            count = 0

          label = 'PROFILE VIEWS'
          val   = f'{count:,}'
          lw    = len(label) * 7 + 16
          vw    = max(40, len(val) * 8 + 16)
          total = lw + vw

          svg = f"""<svg xmlns="http://www.w3.org/2000/svg" width="{total}" height="20">
            <rect rx="3" width="{lw}" height="20" fill="#555"/>
            <rect rx="3" x="{lw}" width="{vw}" height="20" fill="#007ec6"/>
            <g fill="#fff" text-anchor="middle" font-family="DejaVu Sans,Verdana,Geneva,sans-serif" font-size="11">
              <text x="{lw//2}" y="15" fill="#010101" fill-opacity=".3">{label}</text>
              <text x="{lw//2}" y="14">{label}</text>
              <text x="{lw + vw//2}" y="15" fill="#010101" fill-opacity=".3">{val}</text>
              <text x="{lw + vw//2}" y="14">{val}</text>
            </g>
          </svg>"""

          with open('profile-views.svg', 'w') as f:
            f.write(svg)
          print(f"Views: {count}")
          PYEOF

      - name: Commit badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-views.svg
          git diff --staged --quiet || git commit -m "chore: update profile views badge"
          git push
